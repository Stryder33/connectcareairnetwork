<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Mission Case Entry</title>

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@mdi/font@latest/css/materialdesignicons.min.css">

  <style>
    :root {
      --primary: #1976d2;
      --primary-dark: #0d47a1;
      --bg: #f0f3f7;
      --card-bg: #ffffff;
      --radius: 10px;
      --shadow: 0 4px 12px rgba(0,0,0,0.08);
      --transition: 0.25s ease;
    }

    body {
      margin: 0;
      font-family: Montserrat, sans-serif;
      background: var(--bg);
      color: #333;
    }

    header {
      background: var(--primary);
      color: white;
      padding: 30px 20px;
      text-align: center;
      box-shadow: var(--shadow);
    }

    #app {
      max-width: 1100px;
      margin: 40px auto;
      padding: 20px;
    }

    .card {
      background: var(--card-bg);
      padding: 30px;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      margin-bottom: 30px;
    }

    .card h2 {
      margin-top: 0;
      font-weight: 600;
      border-bottom: 2px solid #eee;
      padding-bottom: 10px;
      margin-bottom: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 20px;
    }

    label {
      font-weight: 600;
      margin-bottom: 6px;
      display: block;
    }

    input, select, textarea {
      width: 100%;
      padding: 12px;
      border-radius: var(--radius);
      border: 1px solid #ccc;
      font-size: 15px;
      transition: var(--transition);
      box-sizing: border-box;
    }

    select {
      background: white;
      cursor: pointer;
    }

    input:focus, textarea:focus, select:focus {
      border-color: var(--primary);
      outline: none;
      box-shadow: 0 0 0 3px rgba(25,118,210,0.2);
    }

    textarea {
      resize: vertical;
    }

    button {
      background: var(--primary);
      color: white;
      padding: 14px 26px;
      border: none;
      border-radius: var(--radius);
      font-size: 17px;
      cursor: pointer;
      transition: var(--transition);
      margin-top: 20px;
    }

    button:disabled {
      background: #9bbad8;
      cursor: not-allowed;
    }

    button:hover:not(:disabled) {
      background: var(--primary-dark);
    }

    #result {
      margin-top: 20px;
      padding: 15px;
      background: #e8f4ff;
      border-left: 5px solid var(--primary);
      border-radius: var(--radius);
      display: none;
      animation: fadeIn 0.4s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(5px); }
      to { opacity: 1; transform: translateY(0); }
    }

    #riskPreview {
      font-size: 18px;
      font-weight: 600;
      padding: 12px;
      border-radius: var(--radius);
      background: #fafafa;
      border-left: 5px solid #ccc;
      margin-bottom: 20px;
    }

    footer {
      text-align: center;
      padding: 20px;
      color: #666;
    }
  </style>
</head>

<body>

<header>
  <h1>Mission Case Entry Portal</h1>
</header>

<div id="app">

  <div class="card">
    <h2>Mission Details</h2>

    <div id="riskPreview">Risk Score: 0 (Low)</div>

    <form id="missionForm">

      <div class="grid">
        <div>
          <label>Case Number</label>
          <input type="text" name="caseNumber" required>
        </div>

        <div>
          <label>Name</label>
          <input type="text" name="name" required>
        </div>

        <div>
          <label>Start Time</label>
          <input type="datetime-local" name="startTime">
        </div>

        <div>
          <label>Flight Destination</label>
          <input type="text" name="destination">
        </div>

        <div>
          <label>Route</label>
          <input type="text" name="route">
        </div>
      </div>

      <h2>Risk Factors</h2>

      <div class="grid">

        <div>
          <label>Weather Risk</label>
          <select name="weatherText">
            <option value="0">0 - Normal / VFR</option>
            <option value="1">1 - Marginal</option>
            <option value="2">2 - IFR</option>
            <option value="3">3 - Severe / Hazardous</option>
          </select>
        </div>

        <div>
          <label>Night Operation</label>
          <select name="nightText">
            <option value="0">0 - Day</option>
            <option value="1">1 - Dusk/Dawn</option>
            <option value="2">2 - Night</option>
            <option value="3">3 - Night + Low Illumination</option>
          </select>
        </div>

        <div>
          <label>Terrain Risk</label>
          <select name="terrainText">
            <option value="0">0 - Flat / Normal</option>
            <option value="1">1 - Rolling Terrain</option>
            <option value="2">2 - Hilly</option>
            <option value="3">3 - Over Water / Mountainous</option>
          </select>
        </div>

        <div>
          <label>Fatigue Risk</label>
          <select name="fatigueText">
            <option value="0">0 - Well Rested</option>
            <option value="1">1 - Mild Fatigue</option>
            <option value="2">2 - Tired</option>
            <option value="3">3 - Severe Fatigue</option>
          </select>
        </div>

        <div>
          <label>Patient Risk</label>
          <select name="patientText">
            <option value="0">0 - Stable</option>
            <option value="1">1 - Mildly Unstable</option>
            <option value="2">2 - Unstable</option>
            <option value="3">3 - Critical</option>
          </select>
        </div>

        <div>
          <label>Multiple Legs</label>
          <select name="multiLegText">
            <option value="0">0 - Single Leg</option>
            <option value="1">1 - 2 Legs</option>
            <option value="2">2 - 3 Legs</option>
            <option value="3">3 - 4+ Legs</option>
          </select>
        </div>

        <div>
          <label>International</label>
          <select name="internationalText">
            <option value="0">0 - Domestic</option>
            <option value="1">1 - Border Region</option>
            <option value="2">2 - International</option>
            <option value="3">3 - International + Complexities</option>
          </select>
        </div>

        <div>
          <label>Communication Risk</label>
          <select name="communicationText">
            <option value="0">0 - Normal</option>
            <option value="1">1 - Minor Issues</option>
            <option value="2">2 - Intermittent</option>
            <option value="3">3 - Poor / Lost Comms</option>
          </select>
        </div>
      </div>

      <br>

      <label>Narrative</label>
      <textarea name="narrative" rows="4"></textarea>

      <button id="submitBtn" type="submit">Submit Case</button>
    </form>

    <div id="result"></div>
  </div>

</div>

<footer>
  Mission Entry System • © 2026
</footer>

<script>
  const riskInputs = document.querySelectorAll("select");
  const riskPreview = document.getElementById("riskPreview");

  function updateRiskPreview() {
    let score = 0;
    riskInputs.forEach(i => score += Number(i.value || 0));

    let level = "Low";
    if (score >= 9) level = "High";
    else if (score >= 5) level = "Moderate";

    riskPreview.textContent = `Risk Score: ${score} (${level})`;
    riskPreview.style.borderLeftColor =
      level === "High" ? "#d32f2f" :
      level === "Moderate" ? "#f9a825" :
      "#388e3c";
  }

  riskInputs.forEach(i => i.addEventListener("change", updateRiskPreview));

  document.getElementById("missionForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const submitBtn = document.getElementById("submitBtn");
    submitBtn.disabled = true;
    submitBtn.textContent = "Submitting...";

    const formData = Object.fromEntries(new FormData(e.target).entries());

    if (localStorage.getItem("lastCase") === formData.caseNumber) {
      const confirmDup = confirm("This case number was just submitted. Submit again?");
      if (!confirmDup) {
        submitBtn.disabled = false;
        submitBtn.textContent = "Submit Case";
        return;
      }
    }

    try {
      const response = await fetch(
        "https://script.google.com/macros/s/AKfycbztXDEmOXhyQmuqY6hHeC_yVYs2StKMTOleKM6vEqg24iB9pSeNJW4oXtkZdodd-c4urw/exec",
        {
          method: "POST",
          body: JSON.stringify(formData)
        }
      );

      const text = await response.text();

      localStorage.setItem("lastCase", formData.caseNumber);

      const resultBox = document.getElementById("result");
      resultBox.style.display = "block";
      resultBox.innerHTML = "<strong>✔ Submitted!</strong><br>" + text;

      e.target.reset();
      updateRiskPreview();

    } catch (error) {
      const resultBox = document.getElementById("result");
      resultBox.style.display = "block";
      resultBox.innerHTML = "<strong>Submission Error:</strong><br>" + error.message;
    }

    submitBtn.disabled = false;
    submitBtn.textContent = "Submit Case";
  });

  updateRiskPreview();
</script>

</body>
</html>
