<!-- Index.html -->
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Medical Transport RFQ Intake</title>
  <style>
    /* condensed styling based on your RFQ UI */
    body{font-family:Arial,Helvetica,sans-serif;background:#eef2f7;color:#111;margin:0;padding:20px}
    .page{max-width:1200px;margin:0 auto;padding:28px}
    .header{background:linear-gradient(135deg,#0f172a,#1e3a8a);color:#fff;padding:28px;border-radius:18px;margin-bottom:24px}
    .section{background:#fff;border-radius:12px;padding:18px;margin-bottom:18px;border:1px solid #e5e7eb}
    .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
    .full{grid-column:1/-1}
    label{display:block;font-weight:700;margin-bottom:6px}
    input,select,textarea{width:100%;padding:10px;border-radius:10px;border:1px solid #cbd5e1;background:#f8fafc}
    .actions{display:flex;justify-content:flex-end;gap:12px;margin-top:18px}
    button{padding:12px 20px;border-radius:10px;border:0;font-weight:700;cursor:pointer}
    .submit{background:#2563eb;color:#fff}
    .submit[disabled]{opacity:.6;cursor:not-allowed}
    #status{display:none;padding:12px;border-radius:10px;margin-bottom:12px;font-weight:700}
    .working{display:block;background:#dbeafe;color:#1e40af;border:1px solid #93c5fd}
    .success{display:block;background:#dcfce7;color:#166534;border:1px solid #86efac}
    .error{display:block;background:#fee2e2;color:#991b1b;border:1px solid #fca5a5}
    @media(max-width:800px){.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="page">
    <div class="header">
      <h1>Medical Transport RFQ Intake</h1>
      <p>Submit a complete request for quote for medical transport review and coordination.</p>
    </div>

    <form id="rfqForm">
      <div id="status"></div>

      <div class="section">
        <h2>Authorization</h2>
        <div class="grid">
          <div>
            <label>Case Number <span style="color:#dc2626">*</span></label>
            <input id="caseNumber" required placeholder="Example: RFQ-2026-001">
          </div>
          <div>
            <label><input id="authorized" type="checkbox"> I certify that I am authorized to request this quote. <span style="color:#dc2626">*</span></label>
          </div>
        </div>
      </div>

      <div class="section">
        <h2>Coordinator Information</h2>
        <div class="grid">
          <div><label>Coordinator Name *</label><input id="coordinatorName" required></div>
          <div><label>Coordinator Email *</label><input id="coordinatorEmail" type="email" required></div>
          <div><label>Coordinator Phone Number *</label><input id="coordinatorPhone" required></div>
          <div><label>Request Start Time *</label><input id="requestStartTime" type="datetime-local" required></div>
        </div>
      </div>

      <div class="section">
        <h2>Patient Information</h2>
        <div class="grid">
          <div><label>Patient Full Name *</label><input id="patientFullName" required></div>
          <div><label>Patient Age *</label><input id="patientAge" type="number" min="0" required></div>
          <div><label>Patient Sex *</label><select id="patientSex" required><option value="">Select</option><option>Male</option><option>Female</option><option>Other</option></select></div>
          <div><label>Medical Report Upload Link</label><input id="medicalReportLink" placeholder="Paste Google Drive link"></div>
          <div class="full"><label>Patient Narrative / Medical Summary</label><textarea id="patientNarrative"></textarea></div>
        </div>
      </div>

      <div class="section">
        <h2>Patient Location</h2>
        <div class="grid">
          <div><label>Patient Location Type *</label><select id="patientLocationType" required><option value="">Select</option><option>Hospital</option><option>Home</option><option>Clinic</option><option>Nursing Facility</option><option>Airport</option><option>Other</option></select></div>
          <div><label>Originating City *</label><input id="originatingCity" required></div>
          <div><label>Originating ICAO Airport Code *</label><input id="originatingICAO" maxlength="4" required placeholder="Example: KBDG"></div>
          <div class="full"><label>Patient Location Details *</label><textarea id="patientLocationDetails" required></textarea></div>
        </div>
      </div>

      <div class="section">
        <h2>Flight Information</h2>
        <div class="grid">
          <div><label>Scheduled Departure Date/Time *</label><input id="scheduledDeparture" type="datetime-local" required></div>
          <div><label>Flexible Departure Time? *</label><select id="flexibleDeparture" required><option value="">Select</option><option>Yes</option><option>No</option></select></div>
          <div><label>Ground Transport Required at All Legs? *</label><select id="groundTransportRequired" required><option value="">Select</option><option>Yes</option><option>No</option></select></div>
          <div class="full"><label>Flexibility Notes</label><textarea id="flexibilityNotes"></textarea></div>
        </div>
      </div>

      <div class="section">
        <h2>Medical Equipment & Travel Documents</h2>
        <div class="grid">
          <div class="full"><label>Additional Medical Equipment Required</label><textarea id="additionalMedicalEquipment"></textarea></div>
          <div><label>Passport Upload Link</label><input id="passportLink" placeholder="Paste Google Drive link"></div>
          <div><label>Visa Upload Link</label><input id="visaLink" placeholder="Paste Google Drive link"></div>
        </div>
      </div>

      <div class="section">
        <h2>Quote Validity</h2>
        <div class="grid">
          <div><label>Quote Validity Requested *</label><select id="quoteValidity" required><option value="">Select</option><option>24 Hours</option><option>Other</option></select></div>
          <div id="otherBox" style="display:none"><label>Other Quote Validity Notes *</label><input id="otherQuoteValidityNotes"></div>
        </div>
      </div>

      <div class="section">
        <h2>Signature</h2>
        <div class="grid">
          <div><label>Requestor Signature *</label><input id="requestorSignature" required placeholder="Type full legal name"></div>
          <div><label>Assigned Coordinator</label><input id="assignedCoordinator"></div>
          <div class="full"><label>Notes</label><textarea id="notes"></textarea></div>
        </div>
      </div>

      <div class="actions">
        <button type="button" class="reset" onclick="resetForm()">Reset</button>
        <button id="submitBtn" class="submit" type="submit">Submit RFQ</button>
      </div>
    </form>
  </div>

  <script>
    // Replace with the deployed web app URL for this Apps Script project
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwJnBTnOVZLaVupdQ62qYqIKsQbxUcPGOD0bPXhBzc/dev";

    const form = document.getElementById('rfqForm');
    const statusEl = document.getElementById('status');
    const submitBtn = document.getElementById('submitBtn');
    const quoteValidity = document.getElementById('quoteValidity');
    const otherBox = document.getElementById('otherBox');
    const otherNotes = document.getElementById('otherQuoteValidityNotes');

    function showStatus(message, type) {
      statusEl.className = type;
      statusEl.textContent = message;
      statusEl.style.display = 'block';
    }
    function clearStatus() {
      statusEl.style.display = 'none';
      statusEl.className = '';
      statusEl.textContent = '';
    }
    function toggleOther() {
      if (quoteValidity.value === 'Other') {
        otherBox.style.display = 'block';
        otherNotes.required = true;
      } else {
        otherBox.style.display = 'none';
        otherNotes.required = false;
        otherNotes.value = '';
      }
    }
    quoteValidity.addEventListener('change', toggleOther);

    function validICAO(code) {
      return /^[A-Za-z]{4}$/.test((code || '').trim());
    }

    function getValue(id) {
      const el = document.getElementById(id);
      return el ? el.value : "";
    }

    form.addEventListener('submit', async function(e) {
      e.preventDefault();
      clearStatus();

      if (!document.getElementById('authorized').checked) {
        showStatus('You must certify that you are authorized to request this quote.', 'error');
        return;
      }

      const icaoVal = getValue('originatingICAO');
      if (!validICAO(icaoVal)) {
        showStatus('Originating ICAO Airport Code must be 4 letters (e.g., KBDG).', 'error');
        return;
      }

      if (quoteValidity.value === 'Other' && (!otherNotes.value || otherNotes.value.trim() === '')) {
        showStatus('Other Quote Validity Notes are required when Quote Validity Requested is Other.', 'error');
        return;
      }

      const payload = {
        caseNumber: getValue('caseNumber'),
        authorized: document.getElementById('authorized').checked,
        coordinatorName: getValue('coordinatorName'),
        coordinatorEmail: getValue('coordinatorEmail'),
        coordinatorPhone: getValue('coordinatorPhone'),
        requestStartTime: getValue('requestStartTime'),
        patientFullName: getValue('patientFullName'),
        patientAge: getValue('patientAge'),
        patientSex: getValue('patientSex'),
        medicalReportLink: getValue('medicalReportLink'),
        patientNarrative: getValue('patientNarrative'),
        patientLocationType: getValue('patientLocationType'),
        patientLocationDetails: getValue('patientLocationDetails'),
        originatingCity: getValue('originatingCity'),
        originatingICAO: getValue('originatingICAO').toUpperCase(),
        scheduledDeparture: getValue('scheduledDeparture'),
        flexibleDeparture: getValue('flexibleDeparture'),
        flexibilityNotes: getValue('flexibilityNotes'),
        groundTransportRequired: getValue('groundTransportRequired'),
        additionalMedicalEquipment: getValue('additionalMedicalEquipment'),
        passportLink: getValue('passportLink'),
        visaLink: getValue('visaLink'),
        quoteValidity: getValue('quoteValidity'),
        otherQuoteValidityNotes: getValue('otherQuoteValidityNotes'),
        requestorSignature: getValue('requestorSignature'),
        assignedCoordinator: getValue('assignedCoordinator'),
        notes: getValue('notes')
      };

      // Disable and grey out submit button
      submitBtn.disabled = true;
      submitBtn.textContent = 'Submitting...';
      submitBtn.style.opacity = '0.6';
      showStatus('Submitting RFQ...', 'working');

      try {
        const resp = await fetch(WEB_APP_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        const text = await resp.text();
        let result;
        try { result = JSON.parse(text); } catch (err) { throw new Error('Unexpected server response.'); }

        if (!result || result.success === false) {
          throw new Error(result && result.message ? result.message : 'Submission failed.');
        }

        showStatus((result.message || 'RFQ submitted successfully.') + (result.row ? ' Row ' + result.row + '.' : ''), 'success');
        form.reset();
        toggleOther();
        window.scrollTo({ top: 0, behavior: 'smooth' });

      } catch (err) {
        showStatus('ERROR: ' + (err.message || 'Submission failed.'), 'error');
        console.error('Submit error:', err);
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Submit RFQ';
        submitBtn.style.opacity = '1';
      }
    });

    function resetForm() {
      form.reset();
      toggleOther();
      clearStatus();
      submitBtn.disabled = false;
      submitBtn.textContent = 'Submit RFQ';
    }

    // initialize
    toggleOther();
  </script>
</body>
</html>
