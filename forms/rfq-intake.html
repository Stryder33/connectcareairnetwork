<script>
  // Replace with your deployed Apps Script web app URL
  const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbyMPXKBY_IVnw5UpB-ue8sgfDoy49Qk2oquwNYtM0JPgumAOybW1mM7Et8npkqneovY/exec';

  const form = document.getElementById('rfqForm');
  const statusEl = document.getElementById('status');
  const submitBtn = document.getElementById('submitBtn');
  const quoteValidity = document.getElementById('quoteValidity');
  const otherBox = document.getElementById('otherBox');
  const otherNotes = document.getElementById('otherQuoteValidityNotes');

  function showStatus(message, type) {
    statusEl.className = type;
    statusEl.textContent = message;
    statusEl.style.display = 'block';
  }

  function clearStatus() {
    statusEl.style.display = 'none';
    statusEl.className = '';
    statusEl.textContent = '';
  }

  function toggleOther() {
    if (quoteValidity.value === 'Other') {
      otherBox.style.display = 'block';
      otherNotes.required = true;
    } else {
      otherBox.style.display = 'none';
      otherNotes.required = false;
      otherNotes.value = '';
    }
  }

  quoteValidity.addEventListener('change', toggleOther);

  function validICAO(code) {
    return /^[A-Za-z]{4}$/.test((code || '').trim());
  }

  // Build URLSearchParams payload (form-encoded)
  function buildUrlEncodedPayload() {
    const params = new URLSearchParams();
    params.append('caseNumber', document.getElementById('caseNumber').value.trim());
    params.append('authorized', document.getElementById('authorized').checked ? 'true' : 'false');
    params.append('coordinatorName', document.getElementById('coordinatorName').value.trim());
    params.append('coordinatorEmail', document.getElementById('coordinatorEmail').value.trim());
    params.append('coordinatorPhone', document.getElementById('coordinatorPhone').value.trim());
    params.append('requestStartTime', document.getElementById('requestStartTime').value);
    params.append('patientFullName', document.getElementById('patientFullName').value.trim());
    params.append('patientAge', document.getElementById('patientAge').value);
    params.append('patientSex', document.getElementById('patientSex').value);
    params.append('medicalReportLink', document.getElementById('medicalReportLink').value.trim());
    params.append('patientNarrative', document.getElementById('patientNarrative').value.trim());
    params.append('patientLocationType', document.getElementById('patientLocationType').value);
    params.append('patientLocationDetails', document.getElementById('patientLocationDetails').value.trim());
    params.append('originatingCity', document.getElementById('originatingCity').value.trim());
    params.append('originatingICAO', document.getElementById('originatingICAO').value.trim().toUpperCase());
    params.append('scheduledDeparture', document.getElementById('scheduledDeparture').value);
    params.append('flexibleDeparture', document.getElementById('flexibleDeparture').value);
    params.append('flexibilityNotes', document.getElementById('flexibilityNotes').value.trim());
    params.append('groundTransportRequired', document.getElementById('groundTransportRequired').value);
    params.append('additionalMedicalEquipment', document.getElementById('additionalMedicalEquipment').value.trim());
    params.append('passportLink', document.getElementById('passportLink').value.trim());
    params.append('visaLink', document.getElementById('visaLink').value.trim());
    params.append('quoteValidity', document.getElementById('quoteValidity').value);
    params.append('otherQuoteValidityNotes', document.getElementById('otherQuoteValidityNotes').value.trim());
    params.append('requestorSignature', document.getElementById('requestorSignature').value.trim());
    params.append('assignedCoordinator', document.getElementById('assignedCoordinator').value.trim());
    params.append('notes', document.getElementById('notes').value.trim());
    return params;
  }

  form.addEventListener('submit', async function(e) {
    e.preventDefault();
    clearStatus();

    // Client-side checks
    if (!document.getElementById('authorized').checked) {
      showStatus('You must certify that you are authorized to request this quote.', 'error');
      return;
    }

    const icaoVal = document.getElementById('originatingICAO').value;
    if (!validICAO(icaoVal)) {
      showStatus('Originating ICAO Airport Code must be 4 letters (e.g., KBDG).', 'error');
      return;
    }

    if (quoteValidity.value === 'Other' && (!otherNotes.value || otherNotes.value.trim() === '')) {
      showStatus('Other Quote Validity Notes are required when Quote Validity Requested is Other.', 'error');
      return;
    }

    const payload = buildUrlEncodedPayload();

    // Disable and grey out submit button
    submitBtn.disabled = true;
    submitBtn.textContent = 'Submitting...';
    submitBtn.style.opacity = '0.6';
    showStatus('Submitting RFQ...', 'working');

    try {
      // Use application/x-www-form-urlencoded to avoid preflight
      const resp = await fetch(WEB_APP_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded;charset=UTF-8' },
        body: payload.toString()
      });

      const text = await resp.text();
      let result;
      try {
        result = JSON.parse(text);
      } catch (err) {
        throw new Error('Unexpected server response.');
      }

      if (!result || result.success === false) {
        throw new Error(result && result.message ? result.message : 'Submission failed.');
      }

      showStatus((result.message || 'RFQ submitted successfully.') + (result.row ? ' Row ' + result.row + '.' : ''), 'success');
      form.reset();
      toggleOther();
      window.scrollTo({ top: 0, behavior: 'smooth' });

    } catch (err) {
      // "Failed to fetch" or other network errors will be caught here
      showStatus('ERROR: ' + (err.message || 'Submission failed.'), 'error');
      console.error('Submit error:', err);
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = 'Submit RFQ';
      submitBtn.style.opacity = '1';
    }
  });
</script>
