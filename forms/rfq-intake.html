<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Medical Transport RFQ Intake</title>
<style>
  body{font-family:Arial,Helvetica,sans-serif;background:#eef2f7;color:#111;margin:0;padding:20px}
  .container{max-width:1000px;margin:0 auto}
  .card{background:#fff;padding:20px;border-radius:12px;box-shadow:0 6px 18px rgba(0,0,0,.06);margin-bottom:16px}
  label{display:block;font-weight:700;margin-bottom:6px}
  input,select,textarea{width:100%;padding:10px;border-radius:8px;border:1px solid #cbd5e1;background:#f8fafc}
  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
  .full{grid-column:1/-1}
  .actions{display:flex;justify-content:flex-end;gap:8px;margin-top:12px}
  button{padding:10px 16px;border-radius:8px;border:0;font-weight:700;cursor:pointer}
  .submit{background:#2563eb;color:#fff}
  .submit[disabled]{opacity:.5;cursor:not-allowed}
  .reset{background:#e5e7eb}
  #status{display:none;padding:12px;border-radius:8px;margin-bottom:12px;font-weight:700}
  .success{display:block;background:#dcfce7;color:#166534;border:1px solid #86efac}
  .error{display:block;background:#fee2e2;color:#991b1b;border:1px solid #fca5a5}
  .working{display:block;background:#dbeafe;color:#1e40af;border:1px solid #93c5fd}
  @media(max-width:800px){.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="container">
  <div class="card">
    <h1>Medical Transport RFQ Intake</h1>
    <p>Submit a complete request for quote for medical transport review and coordination.</p>
  </div>

  <form id="rfqForm" class="card" novalidate>
    <div id="status"></div>

    <!-- (fields same as your RFQ form; keep ids identical) -->
    <!-- Authorization -->
    <section>
      <h2>Authorization</h2>
      <div class="grid">
        <div>
          <label for="caseNumber">Case Number *</label>
          <input id="caseNumber" required placeholder="Example: RFQ-2026-001">
        </div>
        <div>
          <label><input id="authorized" type="checkbox"> I certify that I am authorized to request this quote. *</label>
        </div>
      </div>
    </section>

    <!-- Coordinator -->
    <section>
      <h2>Coordinator Information</h2>
      <div class="grid">
        <div><label>Coordinator Name *</label><input id="coordinatorName" required></div>
        <div><label>Coordinator Email *</label><input id="coordinatorEmail" type="email" required></div>
        <div><label>Coordinator Phone Number *</label><input id="coordinatorPhone" required></div>
        <div><label>Request Start Time *</label><input id="requestStartTime" type="datetime-local" required></div>
      </div>
    </section>

    <!-- Patient -->
    <section>
      <h2>Patient Information</h2>
      <div class="grid">
        <div><label>Patient Full Name *</label><input id="patientFullName" required></div>
        <div><label>Patient Age *</label><input id="patientAge" type="number" min="0" required></div>
        <div><label>Patient Sex *</label><select id="patientSex" required><option value="">Select</option><option>Male</option><option>Female</option><option>Other</option></select></div>
        <div><label>Medical Report Upload Link</label><input id="medicalReportLink" placeholder="Paste Google Drive link"></div>
        <div class="full"><label>Patient Narrative / Medical Summary</label><textarea id="patientNarrative"></textarea></div>
      </div>
    </section>

    <!-- Location -->
    <section>
      <h2>Patient Location</h2>
      <div class="grid">
        <div><label>Patient Location Type *</label><select id="patientLocationType" required><option value="">Select</option><option>Hospital</option><option>Home</option><option>Clinic</option><option>Nursing Facility</option><option>Airport</option><option>Other</option></select></div>
        <div><label>Originating City *</label><input id="originatingCity" required></div>
        <div><label>Originating ICAO Airport Code *</label><input id="originatingICAO" maxlength="4" required placeholder="Example: KBDG"></div>
        <div class="full"><label>Patient Location Details *</label><textarea id="patientLocationDetails" required></textarea></div>
      </div>
    </section>

    <!-- Flight -->
    <section>
      <h2>Flight Information</h2>
      <div class="grid">
        <div><label>Scheduled Departure Date/Time *</label><input id="scheduledDeparture" type="datetime-local" required></div>
        <div><label>Flexible Departure Time? *</label><select id="flexibleDeparture" required><option value="">Select</option><option>Yes</option><option>No</option></select></div>
        <div><label>Ground Transport Required at All Legs? *</label><select id="groundTransportRequired" required><option value="">Select</option><option>Yes</option><option>No</option></select></div>
        <div class="full"><label>Flexibility Notes</label><textarea id="flexibilityNotes"></textarea></div>
      </div>
    </section>

    <!-- Equipment & Docs -->
    <section>
      <h2>Medical Equipment & Travel Documents</h2>
      <div class="grid">
        <div class="full"><label>Additional Medical Equipment Required</label><textarea id="additionalMedicalEquipment"></textarea></div>
        <div><label>Passport Upload Link</label><input id="passportLink" placeholder="Paste Google Drive link"></div>
        <div><label>Visa Upload Link</label><input id="visaLink" placeholder="Paste Google Drive link"></div>
      </div>
    </section>

    <!-- Quote Validity -->
    <section>
      <h2>Quote Validity</h2>
      <div class="grid">
        <div><label>Quote Validity Requested *</label><select id="quoteValidity" required><option value="">Select</option><option>24 Hours</option><option>Other</option></select></div>
        <div id="otherBox" style="display:none"><label>Other Quote Validity Notes *</label><input id="otherQuoteValidityNotes"></div>
      </div>
    </section>

    <!-- Signature -->
    <section>
      <h2>Signature</h2>
      <div class="grid">
        <div><label>Requestor Signature *</label><input id="requestorSignature" required placeholder="Type full legal name"></div>
        <div><label>Assigned Coordinator</label><input id="assignedCoordinator"></div>
        <div class="full"><label>Notes</label><textarea id="notes"></textarea></div>
      </div>
    </section>

    <div class="actions">
      <button type="button" class="reset" onclick="resetForm()">Reset</button>
      <button id="submitBtn" class="submit" type="submit">Submit RFQ</button>
    </div>
  </form>
</div>

<script>
  const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbyk0G2zLxV0Rt3XBEZ5I7sNzDgB9kD9A9ShvRQ9RbcFD-D0fEe-kzQVvkh518ZnSuB-/exec';
  const form = document.getElementById('rfqForm');
  const statusEl = document.getElementById('status');
  const submitBtn = document.getElementById('submitBtn');
  const quoteValidity = document.getElementById('quoteValidity');
  const otherBox = document.getElementById('otherBox');
  const otherNotes = document.getElementById('otherQuoteValidityNotes');

  function showStatus(message, type) {
    statusEl.className = type;
    statusEl.textContent = message;
    statusEl.style.display = 'block';
  }
  function clearStatus() {
    statusEl.style.display = 'none';
    statusEl.className = '';
    statusEl.textContent = '';
  }
  function toggleOther() {
    if (quoteValidity.value === 'Other') {
      otherBox.style.display = 'block';
      otherNotes.required = true;
    } else {
      otherBox.style.display = 'none';
      otherNotes.required = false;
      otherNotes.value = '';
    }
  }
  quoteValidity.addEventListener('change', toggleOther);

  function validICAO(code) {
    return /^[A-Za-z]{4}$/.test((code || '').trim());
  }

  function buildUrlEncodedPayload() {
    const params = new URLSearchParams();
    params.append('caseNumber', document.getElementById('caseNumber').value.trim());
    params.append('authorized', document.getElementById('authorized').checked ? 'true' : 'false');
    params.append('coordinatorName', document.getElementById('coordinatorName').value.trim());
    params.append('coordinatorEmail', document.getElementById('coordinatorEmail').value.trim());
    params.append('coordinatorPhone', document.getElementById('coordinatorPhone').value.trim());
    params.append('requestStartTime', document.getElementById('requestStartTime').value);
    params.append('patientFullName', document.getElementById('patientFullName').value.trim());
    params.append('patientAge', document.getElementById('patientAge').value);
    params.append('patientSex', document.getElementById('patientSex').value);
    params.append('medicalReportLink', document.getElementById('medicalReportLink').value.trim());
    params.append('patientNarrative', document.getElementById('patientNarrative').value.trim());
    params.append('patientLocationType', document.getElementById('patientLocationType').value);
    params.append('patientLocationDetails', document.getElementById('patientLocationDetails').value.trim());
    params.append('originatingCity', document.getElementById('originatingCity').value.trim());
    params.append('originatingICAO', document.getElementById('originatingICAO').value.trim().toUpperCase());
    params.append('scheduledDeparture', document.getElementById('scheduledDeparture').value);
    params.append('flexibleDeparture', document.getElementById('flexibleDeparture').value);
    params.append('flexibilityNotes', document.getElementById('flexibilityNotes').value.trim());
    params.append('groundTransportRequired', document.getElementById('groundTransportRequired').value);
    params.append('additionalMedicalEquipment', document.getElementById('additionalMedicalEquipment').value.trim());
    params.append('passportLink', document.getElementById('passportLink').value.trim());
    params.append('visaLink', document.getElementById('visaLink').value.trim());
    params.append('quoteValidity', document.getElementById('quoteValidity').value);
    params.append('otherQuoteValidityNotes', document.getElementById('otherQuoteValidityNotes').value.trim());
    params.append('requestorSignature', document.getElementById('requestorSignature').value.trim());
    params.append('assignedCoordinator', document.getElementById('assignedCoordinator').value.trim());
    params.append('notes', document.getElementById('notes').value.trim());
    return params;
  }

  form.addEventListener('submit', async function(e) {
    e.preventDefault();
    clearStatus();

    if (!document.getElementById('authorized').checked) {
      showStatus('You must certify that you are authorized to request this quote.', 'error');
      return;
    }
    const icaoVal = document.getElementById('originatingICAO').value;
    if (!validICAO(icaoVal)) {
      showStatus('Originating ICAO Airport Code must be 4 letters (e.g., KBDG).', 'error');
      return;
    }
    if (quoteValidity.value === 'Other' && (!otherNotes.value || otherNotes.value.trim() === '')) {
      showStatus('Other Quote Validity Notes are required when Quote Validity Requested is Other.', 'error');
      return;
    }

    const payload = buildUrlEncodedPayload();

    submitBtn.disabled = true;
    submitBtn.textContent = 'Submitting...';
    submitBtn.style.opacity = '0.6';
    showStatus('Submitting RFQ...', 'working');

    try {
      const resp = await fetch(WEB_APP_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded;charset=UTF-8' },
        body: payload.toString()
      });

      const text = await resp.text();
      let result;
      try { result = JSON.parse(text); } catch (err) { throw new Error('Unexpected server response.'); }

      if (!result || result.success === false) {
        throw new Error(result && result.message ? result.message : 'Submission failed.');
      }

      showStatus((result.message || 'RFQ submitted successfully.') + (result.row ? ' Row ' + result.row + '.' : ''), 'success');
      form.reset();
      toggleOther();
      window.scrollTo({ top: 0, behavior: 'smooth' });

    } catch (err) {
      showStatus('ERROR: ' + (err.message || 'Submission failed.'), 'error');
      console.error('Submit error:', err);
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = 'Submit RFQ';
      submitBtn.style.opacity = '1';
    }
  });

  function resetForm() {
    form.reset();
    toggleOther();
    clearStatus();
    submitBtn.disabled = false;
    submitBtn.textContent = 'Submit RFQ';
  }

  toggleOther();
</script>
</body>
</html>
